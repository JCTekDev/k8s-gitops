apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: twentycrm-secrets
  namespace: argocd
  annotations:
    # Deploy first so CNPG cluster and Helm valuesFrom secret are ready before the main app
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: prod
  source:
    repoURL: git@github.com:jctekdev/k8s-manifests-private.git
    targetRevision: main
    # Expected path: twentycrm-secrets/cluster1/
    # Must contain ONE SealedSecret (deployed here to twentycrm-prod):
    #
    # "twentycrm-values-secret" (used by ArgoCD helm.valuesFrom)
    #   apiVersion: v1
    #   kind: Secret
    #   stringData:
    #     values.yaml: |
    #       externalDb:
    #         postgresConnectionString: "postgres://twenty:<PASSWORD>@postgres-cluster1-rw.postgres-infra.svc.cluster.local:5432/twenty"
    #       env:
    #         APP_SECRET: "<openssl rand -base64 32>"
    #
    # A second SealedSecret is needed in k8s-manifests-private/cnpg-secrets/cluster1/:
    # "twentycrm-db-credentials" (used by CNPG Role CRD, deployed to postgres-infra by cnpg-secrets app)
    #   apiVersion: v1
    #   kind: Secret
    #   stringData:
    #     password: <SAME_PASSWORD>
    #
    # Run generate-sealed-secrets.sh to create both files interactively.
    path: twentycrm-secrets/cluster1
  destination:
    server: https://kubernetes.default.svc
    namespace: twentycrm-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
