apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: browseruse-service
  namespace: argocd
  labels:
    app.kubernetes.io/name: browseruse-service
spec:
  project: infra
  source:
    repoURL: git@github.com:JCTekDev/k8s-manifests-public.git
    targetRevision: main
    path: browseruse-service
  destination:
    server: https://kubernetes.default.svc
    namespace: browseruse-service-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
