apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frappe-crm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: prod
  source:
    repoURL: https://helm.erpnext.com
    chart: erpnext
    targetRevision: 8.0.46
    helm:
      valuesObject:
        image:
          repository: ghcr.io/frappe/crm
          tag: stable
          pullPolicy: Always

        # PostgreSQL via CNPG (external)
        mariadb:
          enabled: false
        postgresql:
          enabled: false
        dbHost: postgres-cluster1-rw.postgres-infra.svc
        dbPort: 5432
        dbRootUser: postgres
        dbExistingSecret: frappe-crm-passwords
        dbExistingSecretPasswordKey: db-root-password

        persistence:
          worker:
            enabled: true
            size: 8Gi
            storageClass: local-path
            accessModes:
              - ReadWriteOnce
          logs:
            enabled: true
            size: 4Gi
            storageClass: local-path
            accessModes:
              - ReadWriteOnce

        nginx:
          defaultTopologySpread:
            maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway

        worker:
          defaultTopologySpread:
            maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway

        jobs:
          createSite:
            enabled: true
            siteName: crm.devopian.com
            dbType: postgres
            adminExistingSecret: frappe-crm-passwords
            adminExistingSecretKey: admin-password
            installApps:
              - crm

  destination:
    server: https://kubernetes.default.svc
    namespace: frappe-crm-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/enforce-version: latest
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
