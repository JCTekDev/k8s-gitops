apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frappe-crm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: prod
  source:
    repoURL: https://helm.erpnext.com
    chart: erpnext
    targetRevision: 8.0.46
    helm:
      valuesObject:
        image:
          repository: ghcr.io/frappe/crm
          tag: stable
          pullPolicy: Always

        # PostgreSQL via CNPG (external)
        mariadb:
          enabled: false
        postgresql:
          enabled: false
        dbHost: postgres-cluster1-rw.postgres-infra.svc
        dbPort: 5432
        dbRootUser: postgres
        dbExistingSecret: frappe-crm-passwords
        dbExistingSecretPasswordKey: db-root-password

        persistence:
          worker:
            enabled: true
            size: 8Gi
            storageClass: local-path
            accessModes:
              - ReadWriteOnce
          logs:
            enabled: true
            size: 4Gi
            storageClass: local-path
            accessModes:
              - ReadWriteOnce

        nginx:
          defaultTopologySpread:
            maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway

        worker:
          defaultTopologySpread:
            maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway

        jobs:
          configure:
            enabled: true
            fixVolume: true
            envVars:
              - name: SITE_NAME
                value: crm.devopian.com
              - name: DB_ROOT_USER
                value: postgres
              - name: DB_ROOT_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: frappe-crm-passwords
                    key: db-root-password
              - name: ADMIN_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: frappe-crm-passwords
                    key: admin-password
            args:
              - |
                set -euo pipefail

                ls -1 apps > sites/apps.txt
                [[ -f sites/common_site_config.json ]] || echo "{}" > sites/common_site_config.json

                bench set-config -gp db_port "$DB_PORT"
                bench set-config -g db_host "$DB_HOST"
                bench set-config -g redis_cache "$REDIS_CACHE"
                bench set-config -g redis_queue "$REDIS_QUEUE"
                bench set-config -g redis_socketio "$REDIS_QUEUE"
                bench set-config -gp socketio_port "$SOCKETIO_PORT"

                if [[ -d "sites/${SITE_NAME}" ]]; then
                  echo "Site ${SITE_NAME} already exists"
                  exit 0
                fi

                bench new-site "$SITE_NAME" \
                  --db-type=postgres \
                  --db-host="$DB_HOST" \
                  --db-port="$DB_PORT" \
                  --db-root-username="$DB_ROOT_USER" \
                  --db-root-password="$DB_ROOT_PASSWORD" \
                  --admin-password="$ADMIN_PASSWORD" \
                  --install-app=crm

                rm -f currentsite.txt

          createSite:
            enabled: false
            siteName: crm.devopian.com
            dbType: postgres
            adminExistingSecret: frappe-crm-passwords
            adminExistingSecretKey: admin-password
            installApps:
              - crm

  destination:
    server: https://kubernetes.default.svc
    namespace: frappe-crm-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/enforce-version: latest
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
