apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frappe-crm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: prod
  source:
    repoURL: https://helm.erpnext.com
    chart: erpnext
    targetRevision: 8.0.46
    helm:
      valuesObject:
        image:
          repository: ghcr.io/frappe/crm
          tag: latest
          pullPolicy: Always

        mariadb:
          enabled: true
        postgresql:
          enabled: false

        persistence:
          worker:
            enabled: true
            size: 8Gi
            storageClass: local-path
            accessModes:
              - ReadWriteOnce
          logs:
            enabled: true
            size: 4Gi
            storageClass: local-path
            accessModes:
              - ReadWriteOnce

        nginx:
          defaultTopologySpread:
            maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway

        worker:
          defaultTopologySpread:
            maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway

        jobs:
          configure:
            enabled: true
            fixVolume: true
            envVars:
              - name: SITE_NAME
                value: crm.devopian.com
              - name: DB_ROOT_USER
                value: root
              - name: DB_ROOT_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: frappe-crm-passwords
                    key: db-root-password
              - name: OLD_DB_ROOT_USER
                value: postgres
              - name: OLD_DB_ROOT_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: frappe-crm-passwords
                    key: db-root-password
              - name: ADMIN_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: frappe-crm-passwords
                    key: admin-password
            args:
              - |
                set -euo pipefail

                ls -1 apps > sites/apps.txt
                [[ -f sites/common_site_config.json ]] || echo "{}" > sites/common_site_config.json

                bench set-config -gp db_port "$DB_PORT"
                bench set-config -g db_host "$DB_HOST"
                bench set-config -g redis_cache "$REDIS_CACHE"
                bench set-config -g redis_queue "$REDIS_QUEUE"
                bench set-config -g redis_socketio "$REDIS_QUEUE"
                bench set-config -gp socketio_port "$SOCKETIO_PORT"

                if [[ -d "sites/${SITE_NAME}" ]]; then
                  EXISTING_DB_TYPE="$(jq -r '.db_type // "mariadb"' "sites/${SITE_NAME}/site_config.json" 2>/dev/null || echo "unknown")"

                  if [[ "$EXISTING_DB_TYPE" != "mariadb" ]]; then
                    echo "Site ${SITE_NAME} uses ${EXISTING_DB_TYPE}, recreating it for MariaDB"
                    echo "Database type mismatch" >/tmp/site-check.log
                  elif [[ ! -d apps/crm ]]; then
                    echo "The crm app is not available in this image, recreating after the correct image is deployed"
                    echo "Missing crm app directory" >/tmp/site-check.log
                  elif ! ./env/bin/python -c "import crm" >/tmp/site-check.log 2>&1; then
                    echo "The crm app cannot be imported, recreating after the correct image is deployed"
                  elif bench --site "$SITE_NAME" list-apps >/tmp/site-check.log 2>&1; then
                    echo "Site ${SITE_NAME} already exists and is healthy"
                    cat /tmp/site-check.log
                    exit 0
                  else
                    echo "Site ${SITE_NAME} exists but is incomplete or unhealthy"
                  fi

                  cat /tmp/site-check.log

                  if ! bench drop-site "$SITE_NAME" \
                    --force \
                    --no-backup \
                    --db-root-username="$DB_ROOT_USER" \
                    --db-root-password="$DB_ROOT_PASSWORD"; then
                    echo "bench drop-site failed, falling back to manual cleanup"

                    DB_NAME="$(jq -r '.db_name // empty' "sites/${SITE_NAME}/site_config.json")"
                    DB_USER="$(jq -r '.db_user // .db_name // empty' "sites/${SITE_NAME}/site_config.json")"
                    OLD_DB_HOST="$(jq -r '.db_host // empty' "sites/${SITE_NAME}/site_config.json")"
                    OLD_DB_PORT="$(jq -r '.db_port // 5432' "sites/${SITE_NAME}/site_config.json")"
                    OLD_DB_TYPE="$(jq -r '.db_type // empty' "sites/${SITE_NAME}/site_config.json")"

                    rm -rf "sites/${SITE_NAME}"

                    if [[ "$OLD_DB_TYPE" == "postgres" && -n "$DB_NAME" && -n "$OLD_DB_HOST" ]]; then
                      PGPASSWORD="$OLD_DB_ROOT_PASSWORD" psql \
                        -h "$OLD_DB_HOST" \
                        -p "$OLD_DB_PORT" \
                        -U "$OLD_DB_ROOT_USER" \
                        -d postgres \
                        -v ON_ERROR_STOP=1 \
                        -v db_name="$DB_NAME" \
                        -v db_user="$DB_USER" <<'SQL'
                SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = :'db_name';
                DROP DATABASE IF EXISTS :"db_name";
                DROP ROLE IF EXISTS :"db_user";
                SQL
                    fi
                  fi

                  rm -rf "sites/${SITE_NAME}"
                fi

                bench new-site "$SITE_NAME" \
                  --db-type=mariadb \
                  --db-host="$DB_HOST" \
                  --db-port="$DB_PORT" \
                  --db-root-username="$DB_ROOT_USER" \
                  --db-root-password="$DB_ROOT_PASSWORD" \
                  --admin-password="$ADMIN_PASSWORD" \
                  --install-app=crm \
                  --force

                DB_USER="$(jq -r '.db_user // .db_name' "sites/${SITE_NAME}/site_config.json")"
                DB_PASS="$(jq -r '.db_password' "sites/${SITE_NAME}/site_config.json")"
                mysql -u"$DB_ROOT_USER" -p"$DB_ROOT_PASSWORD" -h "$DB_HOST" -P "$DB_PORT" \
                  -e "CREATE USER IF NOT EXISTS '${DB_USER}'@'%' IDENTIFIED BY '${DB_PASS}'; GRANT ALL PRIVILEGES ON \`${DB_USER}\`.* TO '${DB_USER}'@'%'; FLUSH PRIVILEGES;"

                rm -f currentsite.txt

          createSite:
            enabled: false
            siteName: crm.devopian.com
            dbType: mariadb
            adminExistingSecret: frappe-crm-passwords
            adminExistingSecretKey: admin-password
            installApps:
              - crm

  destination:
    server: https://kubernetes.default.svc
    namespace: frappe-crm-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/enforce-version: latest
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: frappe-crm-mariadb-subchart
      namespace: frappe-crm-prod
      jsonPointers:
        - /data
