apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frappe-crm-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: prod
  source:
    repoURL: git@github.com:jctekdev/k8s-manifests-private.git
    targetRevision: main
    path: frappe-crm-secrets/cluster1
  destination:
    server: https://kubernetes.default.svc
    namespace: frappe-crm-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
