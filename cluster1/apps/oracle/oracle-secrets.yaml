apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oracle-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: dev
  source:
    repoURL: git@github.com:jctekdev/k8s-manifests-private.git
    targetRevision: main
    path: oracle-secrets/cluster1
  destination:
    server: https://kubernetes.default.svc
    namespace: oracle-db-free-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
